# Weekday-morning cron that fires the /cron endpoint on the brand webhook.
# Place at .github/workflows/cis-content-cron.yml in the colemanintegrated.com repo
# (or any GitHub repo you control — same effect either way).
#
# Required repo secret: CIS_CRON_TOKEN
#   Get value by running on your machine:
#     cd ~/scripts/x-content && .venv/bin/python3 -c "import mailer; print(mailer.sign('cron', 'fire'))"

name: CIS Brand Content Cron

on:
  schedule:
    # 12:00 UTC = 7 AM CDT (most of the year) or 6 AM CST (Nov-Mar).
    # Combined with the 0-120min random sleep below, the actual send time falls
    # 7-9 AM Central in summer / 6-8 AM Central in winter. Close enough.
    - cron: "0 12 * * 1-5"
  workflow_dispatch:  # manual run, no random delay

permissions:
  contents: read

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Random delay (0-120 min) for natural send timing
        if: github.event_name == 'schedule'
        run: |
          # 0-7200 second random delay. Spreads daily fires uniformly across 7-9 AM Central.
          # Skipped on workflow_dispatch (manual runs fire immediately).
          delay=$(( RANDOM % 7201 ))
          echo "Sleeping ${delay}s ($(printf '%dm%ds' $((delay/60)) $((delay%60)))) before firing /cron"
          sleep "$delay"

      - name: Hit /cron on the brand webhook
        env:
          CRON_TOKEN: ${{ secrets.CIS_CRON_TOKEN }}
        run: |
          set -euo pipefail
          URL="https://cis-brand-x-webhook.azurewebsites.net/cron"
          # Custom domain posts.colemanintegrated.com is bound but Azure F1 doesn't support
          # managed SSL. Upgrade to B1 ($13/mo) later to switch to the branded URL.
          response=$(curl -sS -X POST "$URL" \
            -H "X-Cron-Token: $CRON_TOKEN" \
            -H "Content-Type: application/json" \
            -w "\n%{http_code}")
          body=$(echo "$response" | head -n -1)
          code=$(echo "$response" | tail -n 1)
          echo "HTTP $code"
          echo "$body"
          [[ "$code" == "200" ]] || exit 1
